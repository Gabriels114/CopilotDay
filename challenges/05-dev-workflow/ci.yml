name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_DIR: challenges/01-intro
  SDL_VIDEODRIVER: dummy
  SDL_AUDIODRIVER: dummy

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: challenges/01-intro/requirements.txt

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Check formatting (ruff format)
        working-directory: ${{ env.PROJECT_DIR }}
        run: ruff format --check .

      - name: Lint (ruff check)
        working-directory: ${{ env.PROJECT_DIR }}
        run: ruff check .

      - name: Add lint summary
        if: always()
        run: |
          {
            echo "## Lint & Format summary"
            echo ""
            echo "- Tool: \`ruff\`"
            echo "- Checks: format (\`ruff format --check\`) + lint (\`ruff check\`)"
            echo "- Path: \`${PROJECT_DIR}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: challenges/01-intro/requirements.txt

      - name: Install system dependencies for pygame
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev

      - name: Install Python dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml \
            --junitxml=test-results/junit.xml \
            --cov-fail-under=80 \
            -v

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-artifacts-py${{ matrix.python-version }}
          path: |
            ${{ env.PROJECT_DIR }}/coverage.xml
            ${{ env.PROJECT_DIR }}/test-results/junit.xml

      - name: Add workflow summary
        if: always()
        run: |
          {
            echo "## CI run summary"
            echo ""
            echo "- Project: \`${PROJECT_DIR}\`"
            echo "- Python: \`${{ matrix.python-version }}\`"
            echo "- Test command: \`pytest tests/ --cov=. --cov-report=term-missing --cov-report=xml --junitxml=test-results/junit.xml --cov-fail-under=80 -v\`"
            echo "- Artifacts: \`coverage.xml\`, \`test-results/junit.xml\`"
          } >> "$GITHUB_STEP_SUMMARY"
